apiVersion: v1
kind: ServiceAccount
metadata:
  name: ahbn-controller
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ahbn-role
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ahbn-binding
  namespace: {{ .Values.namespace }}
subjects:
  - kind: ServiceAccount
    name: ahbn-controller
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: ahbn-role
  apiGroup: rbac.authorization.k8s.io